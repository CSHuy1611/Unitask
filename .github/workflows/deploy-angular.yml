name: Deploy Angular to GitHub Pages

on:
  push:
    branches:
      - main # Workflow tự động chạy khi có code đẩy lên nhánh main

# Cấp quyền cho GitHub Actions để deploy
permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend/unitask # Bắt buộc: Trỏ vào đúng thư mục chứa Angular

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20' # Có thể đổi nếu máy bạn dùng bản Node khác

      - name: Install dependencies
        run: npm ci # Dùng npm ci thay vì npm i trên môi trường server để cài đặt chính xác

      - name: Build Angular project
        # Thêm base-href để web nhận diện đúng đường dẫn thư mục ảo trên GitHub Pages
        run: npx ng build --configuration production --base-href /Unitask/

      - name: Upload artifact for deployment
        uses: actions/upload-pages-artifact@v3
        with:
          # Đường dẫn tới thư mục chứa code tĩnh sau khi build.
          # Angular 17+ thường xuất ra thư mục browser, bạn kiểm tra lại ở máy tính nhé.
          path: './frontend/unitask/dist/unitask/browser'

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4